name: Recover Backend TOML Config

on:
  workflow_dispatch:

jobs:
  recover_secret:
    runs-on: ubuntu-latest
    steps:
      - name: Write Secret to File
        # Passing secret lewat environment variable untuk menghindari script injection / error kutip
        env:
          BACKEND_TOML: ${{ secrets.BACKEND_TOML }}
        run: |
          # Menyimpan isi secret ke dalam file
          cat << 'EOF' > backend.toml
          $BACKEND_TOML
          EOF

      - name: Upload Config as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-config
          path: backend.toml
          retention-days: 1 # Biar besok otomatis kehapus dari GitHub demi keamanan
